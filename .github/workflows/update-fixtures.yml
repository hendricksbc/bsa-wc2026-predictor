name: Update Fixtures

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch fixtures from football-data.org
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          curl -s \
            -H "X-Auth-Token: $FOOTBALL_API_KEY" \
            "https://api.football-data.org/v4/matches?dateFrom=2026-06-11&dateTo=2026-07-19" \
            -o raw_matches.json
          echo "Response size: $(wc -c < raw_matches.json) bytes"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Transform fixtures
        run: node scripts/transform-fixtures.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fixtures.json
          git diff --staged --quiet || git commit -m "chore: update fixtures [skip ci]"
          git push
