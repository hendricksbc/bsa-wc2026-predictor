<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raffle Pool — BSA WC2026</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
  <div class="nav-brand">⚽ BSA WC2026</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="fixtures.html">Fixtures</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="raffle.html">Raffle Pool</a>
  </div>
  <div class="nav-auth" id="nav-auth"></div>
</nav>

<div class="section">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;">
    <div class="section-title" style="margin-bottom:0">🎰 Raffle Pool</div>
    <div style="font-size:13px;color:var(--text-muted)">Paid entries only</div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="stat-entries">–</div><div class="stat-label">In the Pool</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-prize">–</div><div class="stat-label">Raffle Prize</div></div>
  </div>

  <div id="raffle-content">
    <div class="empty-state"><div class="emoji">⏳</div><p>Loading…</p></div>
  </div>
</div>

<script src="js/sheets-client.js"></script>
<script src="js/app.js"></script>
<script>
  async function init() {
    renderNav('a[href="raffle.html"]');

    const [entries, stats] = await Promise.all([
      sheetsGet('paid_entries').catch(() => []),
      sheetsGet('stats').catch(() => ({})),
    ]);

    document.getElementById('stat-entries').textContent = entries.length;
    document.getElementById('stat-prize').textContent = stats.rafflePrize != null ? `R${stats.rafflePrize}` : '–';

    const container = document.getElementById('raffle-content');

    if (!entries.length) {
      container.innerHTML = '<div class="empty-state"><div class="emoji">🎰</div><p>No paid entries yet. Be the first in the pool!</p></div>';
      return;
    }

    container.innerHTML = `<div class="raffle-grid">${
      entries.map(e => `
        <div class="raffle-entry">
          <div class="raffle-avatar">${e.name[0].toUpperCase()}</div>
          <div class="raffle-name">${e.name}</div>
          <div class="raffle-code">${e.refCode}</div>
        </div>`).join('')
    }</div>`;
  }

  init();
</script>
</body>
</html>
